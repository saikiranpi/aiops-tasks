apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-model-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fraud-model
  template:
    metadata:
      labels:
        app: fraud-model
    spec:
      containers:
      - name: api
        image: PLACEHOLDER # Replaced by Kustomize
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "1Gi"
